<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio Drag & Drop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .lista {
            width: 300px;
            margin: auto;
            padding: 0;
            list-style: none;
            border: 1px solid #ccc;
        }
        .item {
            padding: 10px;
            margin: 5px;
            background-color: #f0f0f0;
            cursor: grab;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h2>Reordena los elementos</h2>
    <ul class="lista">
        <li class="item" draggable="true">Elemento 1</li>
        <li class="item" draggable="true">Elemento 2</li>
        <li class="item" draggable="true">Elemento 3</li>
        <li class="item" draggable="true">Elemento 4</li>
    </ul>

    <script>
        const items = document.querySelectorAll('.item');
        const lista = document.querySelector('.lista');
        
        let draggedItem = null;

        items.forEach(item => {
            item.addEventListener('dragstart', (e) => {
                draggedItem = item;
                setTimeout(() => item.style.display = 'none', 0);
            });

            item.addEventListener('dragend', () => {
                setTimeout(() => {
                    draggedItem.style.display = 'block';
                    draggedItem = null;
                }, 0);
            });
        });

        lista.addEventListener('dragover', (e) => {
            e.preventDefault();
            const afterElement = getDragAfterElement(lista, e.clientY);
            if (afterElement == null) {
                lista.appendChild(draggedItem);
            } else {
                lista.insertBefore(draggedItem, afterElement);
            }
        });

        function getDragAfterElement(container, y) {
            const elements = [...container.querySelectorAll('.item:not([style*="display: none"])')];
            return elements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                return offset < 0 && offset > closest.offset ? { offset: offset, element: child } : closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }
    </script>
</body>
</html>
